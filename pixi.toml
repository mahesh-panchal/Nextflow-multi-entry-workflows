[workspace]
authors = ["Mahesh Binzer-Panchal <mahesh.binzer-panchal@nbis.se>"]
channels = ["conda-forge", "bioconda"]
name = "Nextflow best practices"
platforms = ["osx-arm64", "linux-64"]
version = "1.0.0"

[tasks]

[tasks.clean-all]
description = "Remove all untracked files and directories, preserving the .pixi environment"
cmd = "git clean -e .pixi -fdx"

[tasks.lint]
description = "Run nextflow linter on the current directory, excluding .pixi and nf-test configuration"
cmd = "nextflow lint -exclude .pixi -exclude nf-test.config ."

[tasks.nf-tests]
description = "Run the nf-test suite using the specified execution profile"
cmd = "nf-test test --stop-on-first-failure --profile {{ profile }}"
args = [
    { arg = "profile", default = "docker", "choices" = ["docker", "singularity", "conda"] }
]

[tasks.update-nf-tests]
description = "Run the nf-test suite and update test snapshots using the specified execution profile"
cmd = "nf-test test --update-snapshot --profile {{ profile }}"
args = [
    { arg = "profile", default = "docker", "choices" = ["docker", "singularity", "conda"] }
]

# Demo tasks - run each workflow stage with test data
[tasks.demo-main]
description = "Run the full end-to-end pipeline (clean + quant) with paired-end test data"
cmd = """
nextflow run main.nf \
    -profile {{ profile }} \
    --input tests/data/samplesheet.csv \
    --outdir results \
    --genome_fasta https://raw.githubusercontent.com/nf-core/test-datasets/modules/data/genomics/sarscov2/genome/genome.fasta \
    --gtf https://raw.githubusercontent.com/nf-core/test-datasets/modules/data/genomics/sarscov2/genome/genome.gtf \
    --transcript_fasta https://raw.githubusercontent.com/nf-core/test-datasets/modules/data/genomics/sarscov2/genome/transcriptome.fasta
"""
args = [
    { arg = "profile", default = "docker", choices = ["docker", "singularity", "conda"] }
]

[tasks.demo-clean]
description = "Run Stage 1: trim and QC reads with paired-end test data"
cmd = """
nextflow run clean_data.nf \
    -profile {{ profile }} \
    --input tests/data/samplesheet.csv \
    --outdir results
"""
args = [
    { arg = "profile", default = "docker", choices = ["docker", "singularity", "conda"] }
]

[tasks.demo-quant]
description = "Run Stage 2: quantify expression with paired-end test data"
cmd = """
nextflow run quant_data.nf \
    -profile {{ profile }} \
    --input tests/data/samplesheet.csv \
    --outdir results \
    --genome_fasta https://raw.githubusercontent.com/nf-core/test-datasets/modules/data/genomics/sarscov2/genome/genome.fasta \
    --gtf https://raw.githubusercontent.com/nf-core/test-datasets/modules/data/genomics/sarscov2/genome/genome.gtf \
    --transcript_fasta https://raw.githubusercontent.com/nf-core/test-datasets/modules/data/genomics/sarscov2/genome/transcriptome.fasta
"""
args = [
    { arg = "profile", default = "docker", choices = ["docker", "singularity", "conda"] }
]

[dependencies]
nextflow = ">=25.10.4,<26"
nf-core = ">=3.5.2,<4"
nf-test = ">=0.9.5,<0.10"
gh = ">=2.88.1,<3"
